global
    log stdout format raw local0
    maxconn 4096
    tune.bufsize 65536
    tune.maxrewrite 16384

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option forwardfor
    option redispatch
    retries 3
    timeout connect 10s
    timeout client 10m
    timeout server 10m
    timeout http-request 30s
    timeout http-keep-alive 30s

frontend inforex_http
    bind *:80
    http-request set-header X-Forwarded-Proto http
    http-request set-header X-Forwarded-Port 9080
    default_backend inforex_www

backend inforex_www
    balance roundrobin
    default-server inter 3s fall 3 rise 2 init-addr last,libc,none
    server www www:80 check
