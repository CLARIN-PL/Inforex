services:
  haproxy:
    image: haproxy:2.9-alpine
    ports:
      - "9080:80"
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - www
    restart: unless-stopped

  www:
    build:
      context: .
      dockerfile: docker/www/Dockerfile.prod
    expose:
      - "80"
    links:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/www/config:/home/inforex/config
      - ./secured_data:/home/inforex/secured_data
      - ./docker/korpuskop-data/var:/opt/korpuskop/var
    depends_on:
      - db
      - korpuskop-worker
    restart: unless-stopped

  korpuskop-worker:
    build:
      context: .
      dockerfile: docker/korpuskop-worker/Dockerfile
    expose:
      - "8090"
    volumes:
      - ./secured_data:/home/inforex/secured_data
      - ./docker/korpuskop-data/var:/opt/korpuskop/var
    restart: unless-stopped

  liquibase:
    build: ./docker/liquibase
    links:
      - db
    depends_on:
      - db
    volumes:
      - ./database:/workdir/database
    working_dir: /workdir
    command: /bin/bash run.sh

  db:
    image: mysql:5.7
    ports:
      - "3333:3306"
    environment:
      TZ: "Europe/Rome"
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
      MYSQL_ROOT_PASSWORD: "password"
      MYSQL_USER: "inforex"
      MYSQL_PASSWORD: "password"
      MYSQL_DATABASE: "inforex"
    command: --sql_mode="STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/mysqld.cnf:/etc/mysql/mysql.conf.d/mysqld.cnf
    restart: unless-stopped

  backup:
    image: fradelg/mysql-cron-backup
    depends_on:
      - db
    volumes:
      - /opt/backup:/backup
    environment:
      MYSQL_HOST: "db"
      MYSQL_USER: "inforex"
      MYSQL_PASS: "password"
      MYSQL_PROT: "3333"
      MAX_BACKUPS: "15"
      INIT_BACKUP: "0"
      MYSQLDUMP_OPTS: --routines
      CRON_TIME: "00 3 * * *"
      GZIP_LEVEL: "9"
    restart: unless-stopped

volumes:
  mysql_data:
