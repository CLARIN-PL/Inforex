services:
    haproxy:
      image: haproxy:2.9-alpine
      ports:
       - "9080:80"
      volumes:
       - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      depends_on:
       - www
      restart: always
    www:
      build: ./docker/www
      expose:
       - "80"
      links:
       - db
       - keycloak
      extra_hosts:
       - "host.docker.internal:host-gateway"
      volumes:
        - ./public_html:/home/inforex/public_html
        - ./local:/home/inforex/local
        - ./engine:/home/inforex/engine
        - ./docker/www/config:/home/inforex/config
        - ./secured_data:/home/inforex/secured_data
        - ./phpunit:/home/inforex/phpunit
        - ./vendor:/home/inforex/vendor
        - ./docker/korpuskop-data/var:/opt/korpuskop/var
      depends_on:
      - db
      - keycloak
      - korpuskop-worker
      restart: always     
    korpuskop-worker:
      build:
        context: .
        dockerfile: docker/korpuskop-worker/Dockerfile
      expose:
       - "8090"
      volumes:
       - ./secured_data:/home/inforex/secured_data
       - ./docker/korpuskop-data/var:/opt/korpuskop/var
      restart: always
    phpmyadmin:
      image: phpmyadmin/phpmyadmin
      ports:
       - "7080:80"
      depends_on:
       - db
    liquibase:
      build: ./docker/liquibase
      links:
      - db
      depends_on:
      - db
      volumes:
      - ./database:/workdir/database
      working_dir: /workdir
      command: /bin/bash run.sh
    db:
      image: mysql:5.7
      ports:
       - "3333:3306"
      environment:
         TZ: "Europe/Rome"
         MYSQL_ALLOW_EMPTY_PASSWORD: "no"
         MYSQL_ROOT_PASSWORD: "password"
         MYSQL_USER: 'inforex'
         MYSQL_PASSWORD: 'password'
         MYSQL_DATABASE: 'inforex'
      command: --sql_mode="STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION"
      volumes:
       - ./database/init:/docker-entrypoint-initdb.d:ro
       - ./database/inforex-v1.0.sql:/home/inforex-bootstrap/inforex-v1.0.sql:ro
       - ./docker/mysql/mysqld.cnf:/etc/mysql/mysql.conf.d/mysqld.cnf
      restart: always     
    keycloak:
      image: quay.io/keycloak/keycloak:26.2
      ports:
       - "9081:8080"
      environment:
         KEYCLOAK_ADMIN: admin
         KEYCLOAK_ADMIN_PASSWORD: admin
         KC_BOOTSTRAP_ADMIN_USERNAME: admin
         KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      command:
       - start-dev
       - --http-enabled=true
       - --hostname=http://localhost:9081
       - --hostname-strict=false
       - --proxy-headers=xforwarded
       - --import-realm
      healthcheck:
        test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
        interval: 10s
        timeout: 5s
        retries: 12
        start_period: 20s
      volumes:
       - ./docker/keycloak/realm-inforex.json:/opt/keycloak/data/import/realm-inforex.json:ro
      restart: always
